name: Daily App Store charts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

concurrency:
  group: appstore-daily-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect-and-deploy:
    name: Collect charts and deploy Pages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Collect charts and build site
        run: npm run daily
        env:
          CONCURRENCY: 4
          RETRIES: 3
          LIMIT: 100
      - name: Save daily data
        run: |
          git config user.name "appstore-monitor-bot"
          git config user.email "appstore-monitor-bot@users.noreply.github.com"
          git add -f data/archive data/latest
          git diff --cached --quiet || git commit -m "data: update App Store charts"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
